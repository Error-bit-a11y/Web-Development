<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>styling list using css</title>
</head>
<style>
    nav ul li {
       
    list-style-type: devanagari;
    list-style-position: inside;
    background-color: rgb(80, 19, 138);
    border: 2px solid black;
    /* list-style-type:disc inside url("https://share.google/Ty6wW2x2oMfTYlMHZ"); */
}
    
</style>

<body>
    <nav>
        <ul>
            <li>😎Name</li>
            <li>💕Age</li>
            <li>😒Hobby</li>
        </ul>
    </nav>
</body>

</html>

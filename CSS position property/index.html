<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS position property</title>
</head>
<style>
    * {
        margin: 0 px;
        padding: 0 px;
    }

    .parent {
        /* transform,filter or prespective  can also make an element appear as positioned */
        margin: 23px;
        padding: 34px;
        border: 2px solid yellowgreen;
        /* position: sticky; */
        /* transform: translate(0); */
        /* filter: invert(0); */
        /* perspective: 0em; */
    }

    .box {
        height: 560px;
        width: 360px;
        margin: 3px;
        padding: 3px;
        border: 2px solid rgb(220, 235, 6);
    }

    .box1 {
        background-color: blueviolet;
        /* position: relative; */
        /* position: sticky;
        top: 0px; */
        position: relative;
        top: 0px;
        left: 8px;
        /* z-index: ; */
    }

    .box2 {
        background-color: rgb(228, 82, 220);
        position: relative;
    }

    .box3 {
        background-color: rgb(90, 120, 239);
        position: relative;
        /* position: fixed;
        bottom: 0px;
        left: 8vw;
        height: 111p; */
    }

    .box4 {
        background-color: rgb(235, 76, 132);
        position: relative;
    }
</style>

<body>
    <div class=" parent">

        <div class=" box box1"></div>
        <div class="box box2"></div>
        <div class=" box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>

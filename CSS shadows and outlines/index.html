<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS shadows and outlines</title>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&display=swap');

    .box {
        border: 2px solid rgb(15, 13, 13);
        padding: 34px;
        box-shadow: 5px 5px 15px rgb(10, 10, 10);
        font-family: "Bungee Shade", sans-serif;
        color: rgb(11, 11, 11);
        background-color: rgb(102, 99, 244);
        -webkit-text-fill-color: rgb(37, 6, 67);


    }
    .lop{
        text-shadow: 2px 2px red;
        outline: 2px solid black;
        border: 2px solid black;
        border-radius: 12px;
    }
</style>

<body>
    <div class=" box">I am a box</div>
    <p class = "lop">Lorem ipsum dolor sit amet consectetur adipisicing elit. Assumenda dolorum necessitatibus earum dolorem obcaecati et fugit facilis, quo labore voluptas tempora dolore asperiores facere vitae. Magnam officiis tenetur sapiente sed?</p>
</body>

</html>

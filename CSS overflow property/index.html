<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow</title>
</head>
<style>
    .box{
        border: 2px solid black;
        width: 5vw;
        height: 20vw;
        overflow: auto;
        /* white-space: nowrap; allign text in horizontal line */
        /* text-overflow: ellipsis; give dots at the end of the line */
        /* overflow-x: hidden; */
        /* overflow-y: scroll; */ 
        /* overflow: hidden auto; same as x and y */
    }
</style>
<body>
    <div class ="box">I am a human and i am a good boy Lorem ipsum dolor sit amet consectetur adipisicing elit. Modi facilis quae cum sequi amet, vero sunt ratione enim rerum nemo hic natus molestias, a unde, magni odio nulla incidunt earum.</div>
</body>
</html>

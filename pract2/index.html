<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formt</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Forms for cockroaches</h1>

    <form action="post">
        <div>
            <label for="Username" placeholder="your name">Enter Your Name</label>
            <input type="text" id="Username" Name="Username" placeholder="Enter your Username">
        </div>
        <p>Choose Your Gender:</p>
        <div>
            <input type="radio" id="male" name="your_gender" value="male">
            <label for="Male">Male</label><br>

            <input type="radio" id="Female" name="your_gender" value="female">
            <label for="Female">Female</label><br>

            <input type="radio" id="Gay" name="your_gender" value="Gay">
            <label for="Gay">Gay</label><br>
        </div>

        <div>
            <input type="checkbox" name="JOIN" id="Join">
            <label for="Join">Want to Join ?</label>
        </div>
        <p>your occupation</p>
        <div>
            <select name="your Occupation" id="Ocupation">
                <option value="Student">Student</option>
                <option value="Unemployed">unemployed</option>
                <option value="lazy">lazy</option>
                <option value="Gamer">gamer</option>
                <option value="Democractic">Democarctic</option>
            </select>

            <p>Tell me what you want to change</p>
            <div>
                <label for="Comment">Comment</label>
                <textarea name="yourViews" id="yourviews" rows="8" cols="20"></textarea>
            </div>
        </div>
    </form>


</body>

</html>
